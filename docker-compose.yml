version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qode-photo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qode_photo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qode_photo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
