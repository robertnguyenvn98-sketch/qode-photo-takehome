app = "qode-user-service"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4001"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  method = "GET"
  path = "/health"
  protocol = "http"
  interval = "15s"
  timeout = "2s"
  grace_period = "30s"