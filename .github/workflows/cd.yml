name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm with Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.8.1 --activate
          command -v pnpm
          pnpm --version

      - name: Prepare migration database URLs
        id: prepare-db-urls
        env:
          USER_SERVICE_DATABASE_URL: ${{ secrets.USER_SERVICE_DATABASE_URL }}
          PHOTO_SERVICE_DATABASE_URL: ${{ secrets.PHOTO_SERVICE_DATABASE_URL }}
        run: |
          set -eu

          add_schema_if_missing() {
            url="$1"
            schema="$2"

            case "$url" in
              *"schema="*)
                printf '%s\n' "$url"
                ;;
              *"?"*)
                printf '%s&schema=%s\n' "$url" "$schema"
                ;;
              *)
                printf '%s?schema=%s\n' "$url" "$schema"
                ;;
            esac
          }

          if [ -z "$USER_SERVICE_DATABASE_URL" ]; then
            echo "USER_SERVICE_DATABASE_URL is not configured" >&2
            exit 1
          fi

          if [ -z "$PHOTO_SERVICE_DATABASE_URL" ]; then
            echo "PHOTO_SERVICE_DATABASE_URL is not configured" >&2
            exit 1
          fi

          USER_DB_URL="$(add_schema_if_missing "$USER_SERVICE_DATABASE_URL" "user_domain")"
          PHOTO_DB_URL="$(add_schema_if_missing "$PHOTO_SERVICE_DATABASE_URL" "photo_domain")"

          echo "user_db_url=$USER_DB_URL" >> "$GITHUB_OUTPUT"
          echo "photo_db_url=$PHOTO_DB_URL" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run user-service migration deploy
        working-directory: services/user-service
        env:
          DATABASE_URL: ${{ steps.prepare-db-urls.outputs.user_db_url }}
        run: pnpm prisma:migrate:deploy

      - name: Run photo-service migration deploy
        working-directory: services/photo-service
        env:
          DATABASE_URL: ${{ steps.prepare-db-urls.outputs.photo_db_url }}
        run: pnpm prisma:migrate:deploy

