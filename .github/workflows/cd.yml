name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FLYCTL_VERSION: 0.3.133

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run user-service migration deploy
        working-directory: services/user-service
        env:
          DATABASE_URL: ${{ secrets.USER_SERVICE_DATABASE_URL }}
        run: pnpm prisma:migrate:deploy

      - name: Run photo-service migration deploy
        working-directory: services/photo-service
        env:
          DATABASE_URL: ${{ secrets.PHOTO_SERVICE_DATABASE_URL }}
        run: pnpm prisma:migrate:deploy

  deploy-fly:
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: user-service
            app: qode-user-service
            workdir: services/user-service
          - name: photo-service
            app: qode-photo-service
            workdir: services/photo-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}

      - name: Deploy ${{ matrix.name }} to Fly.io
        working-directory: ${{ matrix.workdir }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only --app ${{ matrix.app }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-fly
    timeout-minutes: 10

    steps:
      - name: Trigger web deploy
        run: |
          if [ -z "${{ secrets.WEB_DEPLOY_HOOK_URL }}" ]; then
            echo "WEB_DEPLOY_HOOK_URL is not configured" >&2
            exit 1
          fi
          curl -fsSL -X POST "${{ secrets.WEB_DEPLOY_HOOK_URL }}"

  healthcheck:
    runs-on: ubuntu-latest
    needs: deploy-web
    timeout-minutes: 10

    steps:
      - name: Check web health
        run: |
          if [ -z "${{ secrets.WEB_HEALTHCHECK_URL }}" ]; then
            echo "WEB_HEALTHCHECK_URL is not configured" >&2
            exit 1
          fi
          curl -fsSL --retry 10 --retry-delay 6 "${{ secrets.WEB_HEALTHCHECK_URL }}"

      - name: Check user-service health
        run: |
          if [ -z "${{ secrets.USER_SERVICE_HEALTHCHECK_URL }}" ]; then
            echo "USER_SERVICE_HEALTHCHECK_URL is not configured" >&2
            exit 1
          fi
          curl -fsSL --retry 10 --retry-delay 6 "${{ secrets.USER_SERVICE_HEALTHCHECK_URL }}"

      - name: Check photo-service health
        run: |
          if [ -z "${{ secrets.PHOTO_SERVICE_HEALTHCHECK_URL }}" ]; then
            echo "PHOTO_SERVICE_HEALTHCHECK_URL is not configured" >&2
            exit 1
          fi
          curl -fsSL --retry 10 --retry-delay 6 "${{ secrets.PHOTO_SERVICE_HEALTHCHECK_URL }}"
